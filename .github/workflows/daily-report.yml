name: Selective Mutism Daily Report

on:
  schedule:
    - cron: "10 11 * * *" # UTC 11:10 = 台北時間 19:10
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Cache node_modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> $GITHUB_OUTPUT
          fi
          echo "Date: $(cat $GITHUB_OUTPUT | grep target | cut -d= -f2)"

      - name: Fetch papers from multiple databases
        env:
          FETCH_TIMEOUT_MS: "480000"
        run: |
          node scripts/fetch_papers.mjs \
            --days 7 \
            --max-papers 40 \
            --output papers.json
        continue-on-error: true

      - name: Check papers data
        id: papers
        run: |
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(node -e "const d=require('./papers.json'); console.log(d.count||0)")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> $GITHUB_OUTPUT
            node -e "process.stdout.write(JSON.stringify({date:'${{ steps.date.outputs.target }}',count:0,papers:[],summarized_pmids:[]}))" > papers.json
            echo "No papers found, will generate empty report"
          fi

      - name: Load previously summarized PMIDs
        id: dedup
        run: |
          node scripts/load_dedup.mjs --output summarized_cache.json || echo '{"pmids":[]}' > summarized_cache.json

      - name: Generate report with GLM AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          node scripts/generate_report.mjs \
            --input papers.json \
            --dedup summarized_cache.json \
            --output docs/sm-${{ steps.date.outputs.target }}.html \
            --date ${{ steps.date.outputs.target }}

      - name: Save summarized PMIDs
        run: |
          node scripts/save_dedup.mjs --input papers.json --cache summarized_cache.json

      - name: Generate index page
        run: node scripts/generate_index.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ summarized_cache.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "📄 selective mutism daily report: ${{ steps.date.outputs.target }}"
          git pull --rebase origin main
          git push

      - name: Summary
        run: |
          echo "### 📄 Selective Mutism Daily Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ steps.date.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "**Papers analyzed:** ${{ steps.papers.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Report:** [sm-${{ steps.date.outputs.target }}.html](https://u8901006.github.io/selective-mutism/sm-${{ steps.date.outputs.target }}.html)" >> $GITHUB_STEP_SUMMARY
